name: Release

on:
  push:
    tags:
      - 'v*'

jobs:

  build-windows-amd64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install NSIS
        run: choco install nsis -y

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Build
        run: wails build -nsis

      - name: Rename Windows outputs
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build\bin\renamed
          Move-Item build\bin\Clipcat.exe build\bin\renamed\Clipcat-windows-amd64.exe
          $installer = Get-ChildItem build\bin\*installer.exe -ErrorAction SilentlyContinue
          if ($installer) {
            Move-Item $installer.FullName build\bin\renamed\Clipcat-windows-installer.exe
          }

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-windows-amd64
          path: build/bin/renamed/*


  release:
    runs-on: ubuntu-latest
    needs:
      - build-windows-amd64
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate commit log
        run: |
          CURR_TAG="${GITHUB_REF#refs/tags/}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v' | sed -n '2p')
          echo "## Commits" > commit_log.md
          echo "" >> commit_log.md
          if [ -n "$PREV_TAG" ]; then
            echo "Changes since \`${PREV_TAG}\`:" >> commit_log.md
            echo "" >> commit_log.md
            git log "${PREV_TAG}..${CURR_TAG}" --pretty=format:"- %s (%h)" --no-merges >> commit_log.md
          else
            git log "${CURR_TAG}" --pretty=format:"- %s (%h)" --no-merges >> commit_log.md
          fi
          echo "" >> commit_log.md

      - uses: actions/download-artifact@v4
        with:
          path: binaries
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body_path: commit_log.md
          files: binaries/*