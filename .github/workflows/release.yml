name: Release

on:
  push:
    tags:
      - 'v*'

jobs:

  build-windows-amd64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install NSIS
        run: |
          choco install nsis -y
          echo "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Build
        run: wails build -nsis

      - name: Rename Windows outputs
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build\bin\renamed
          Move-Item build\bin\Clipcat.exe build\bin\renamed\Clipcat-windows-amd64.exe
          $installer = Get-ChildItem build\bin\*installer.exe -ErrorAction SilentlyContinue
          if ($installer) {
            Move-Item $installer.FullName build\bin\renamed\Clipcat-windows-installer.exe
          }

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-windows-amd64
          path: build/bin/renamed/*


  release:
    runs-on: ubuntu-latest
    needs:
      - build-windows-amd64
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate commit log
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CURR_TAG="${GITHUB_REF#refs/tags/}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v' | sed -n '2p')
          REPO="${{ github.repository }}"

          echo "## What's Changed" > commit_log.md
          echo "" >> commit_log.md

          if [ -n "$PREV_TAG" ]; then
            echo "Changes since \`${PREV_TAG}\`:" >> commit_log.md
            echo "" >> commit_log.md

            # Fetch compare data once and reuse it
            COMPARE_JSON=$(gh api "repos/${REPO}/compare/${PREV_TAG}...${CURR_TAG}")

            # Write commits with @username
            echo "$COMPARE_JSON" | jq -r '
              .commits[] |
              select(.commit.message | startswith("Merge ") | not) |
              "- " + (.commit.message | split("\n")[0]) + " (" + .sha[0:7] + ") @" + (.author.login // .commit.author.name)
            ' >> commit_log.md

            echo "" >> commit_log.md

            # Detect new contributors
            mapfile -t CURR_LOGINS < <(echo "$COMPARE_JSON" | jq -r '
              [.commits[].author | select(. != null) | .login] | unique[]
            ')

            mapfile -t PREV_LOGINS < <(gh api "repos/${REPO}/commits?sha=${PREV_TAG}" \
              --paginate \
              --jq '[.[].author | select(. != null) | .login] | unique[]' \
              | sort -u)

            NEW_CONTRIBS=()
            for login in "${CURR_LOGINS[@]}"; do
              found=false
              for prev in "${PREV_LOGINS[@]}"; do
                if [ "$login" = "$prev" ]; then
                  found=true
                  break
                fi
              done
              if [ "$found" = false ]; then
                NEW_CONTRIBS+=("$login")
              fi
            done

            if [ ${#NEW_CONTRIBS[@]} -gt 0 ]; then
              echo "## New Contributors" >> commit_log.md
              echo "" >> commit_log.md
              for login in "${NEW_CONTRIBS[@]}"; do
                echo "- @${login} made their first contribution!" >> commit_log.md
              done
              echo "" >> commit_log.md
            fi
          else
            # First release — GitHub compare API not available, fall back to git log with author name
            git log "${CURR_TAG}" --pretty=format:"- %s (%h) @%an" --no-merges >> commit_log.md
            echo "" >> commit_log.md
          fi

      - uses: actions/download-artifact@v4
        with:
          path: binaries
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body_path: commit_log.md
          files: binaries/*